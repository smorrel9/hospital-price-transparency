app = "hospital-price-transparency"
primary_region = "dfw"

[build]

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/prices.db"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "sqlite_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
